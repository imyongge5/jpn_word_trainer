name: 릴리즈 태그 배포

run-name: 릴리즈 배포 · ${{ github.ref_name }}

on:
  push:
    tags:
      - release-v*

permissions:
  contents: write

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: JDK 17 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 릴리즈 버전 계산
        id: version_tag
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          version_tag="${release_tag#release-}"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"

      - name: main 포함 여부 확인
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "release-v* 태그는 main 브랜치에 포함된 커밋에만 붙일 수 있습니다."
            exit 1
          fi

      - name: Firebase 배포 대상 확인
        shell: bash
        run: |
          if [ -z "${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}" ] && [ -z "${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}" ]; then
            echo "FIREBASE_APP_DISTRIBUTION_GROUPS 또는 FIREBASE_APP_DISTRIBUTION_TESTERS secret 중 하나가 필요합니다."
            exit 1
          fi

      - name: Firebase 서비스 계정 파일 생성
        shell: bash
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/firebase-service-account.json"
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: 릴리즈 노트 파일 생성
        shell: bash
        run: |
          notes_file="$RUNNER_TEMP/release-notes.txt"
          {
            echo "Release tag: ${{ github.ref_name }}"
            echo "Version: ${{ steps.version_tag.outputs.version_tag }}"
            echo "Commit: ${{ github.sha }}"
          } > "$notes_file"
          echo "FIREBASE_RELEASE_NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

      - name: 프리빌트 시드 DB 생성
        run: python scripts/generate_seed_db.py

      - name: 릴리즈 APK 빌드
        env:
          APP_VERSION_TAG: ${{ steps.version_tag.outputs.version_tag }}
          FIREBASE_APP_DISTRIBUTION_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}
          FIREBASE_APP_DISTRIBUTION_TESTERS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}
        run: ./gradlew assembleRelease

      - name: Firebase App Distribution 배포
        env:
          APP_VERSION_TAG: ${{ steps.version_tag.outputs.version_tag }}
          FIREBASE_APP_DISTRIBUTION_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}
          FIREBASE_APP_DISTRIBUTION_TESTERS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}
        run: ./gradlew appDistributionUploadRelease

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version_tag.outputs.version_tag }}
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            Version: ${{ steps.version_tag.outputs.version_tag }}
            Source tag: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
