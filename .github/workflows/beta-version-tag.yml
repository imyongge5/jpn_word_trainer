name: beta-version-tag

on:
  push:
    branches:
      - beta

permissions:
  contents: write

jobs:
  tag-beta-version:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 버전 라인 읽기
        id: version_line
        shell: bash
        run: |
          source version-series.properties
          echo "version_a=$VERSION_A" >> "$GITHUB_OUTPUT"
          echo "version_b=$VERSION_B" >> "$GITHUB_OUTPUT"

      - name: 현재 커밋의 기존 버전 태그 확인
        id: existing_tag
        shell: bash
        run: |
          current_tag=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          echo "tag=$current_tag" >> "$GITHUB_OUTPUT"

      - name: 다음 버전 태그 계산
        if: steps.existing_tag.outputs.tag == ''
        id: next_tag
        shell: bash
        run: |
          prefix="v${{ steps.version_line.outputs.version_a }}.${{ steps.version_line.outputs.version_b }}."
          latest_tag=$(git tag --list "${prefix}*" --sort=-version:refname | head -n 1)

          if [ -z "$latest_tag" ]; then
            next_ccc=1
          else
            next_ccc=$(echo "$latest_tag" | awk -F. '{print $3 + 1}')
          fi

          echo "tag=${prefix}${next_ccc}" >> "$GITHUB_OUTPUT"

      - name: 버전 태그 생성 및 푸시
        if: steps.existing_tag.outputs.tag == ''
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next_tag.outputs.tag }}"
          git push origin "${{ steps.next_tag.outputs.tag }}"
