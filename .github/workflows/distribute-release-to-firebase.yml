name: 릴리즈를 Firebase에 배포

run-name: Firebase 배포 · ${{ github.event.release.tag_name }}

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  distribute-firebase:
    name: Firebase App Distribution 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Firebase 배포 대상 확인
        shell: bash
        run: |
          if [ -z "${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}" ] && [ -z "${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}" ]; then
            echo "FIREBASE_APP_DISTRIBUTION_GROUPS 또는 FIREBASE_APP_DISTRIBUTION_TESTERS secret 중 하나가 필요합니다."
            exit 1
          fi

      - name: JDK 17 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Firebase 서비스 계정 파일 생성
        shell: bash
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/firebase-service-account.json"
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: 릴리즈 노트 파일 생성
        shell: bash
        run: |
          notes_file="$RUNNER_TEMP/release-notes.txt"
          {
            echo "Release tag: ${{ github.event.release.tag_name }}"
            echo "Release name: ${{ github.event.release.name }}"
            echo "Release URL: ${{ github.event.release.html_url }}"
          } > "$notes_file"
          echo "FIREBASE_RELEASE_NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

      - name: 릴리즈 APK 다운로드
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN }}
        shell: bash
        run: |
          mkdir -p app/build/outputs/apk/release
          gh release download "${{ github.event.release.tag_name }}" --pattern "app-release.apk" --dir app/build/outputs/apk/release

      - name: Firebase App Distribution 배포
        env:
          APP_VERSION_TAG: ${{ github.event.release.tag_name }}
          FIREBASE_APP_DISTRIBUTION_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}
          FIREBASE_APP_DISTRIBUTION_TESTERS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}
        run: ./gradlew appDistributionUploadRelease
