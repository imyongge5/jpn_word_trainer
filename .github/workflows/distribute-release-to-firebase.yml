name: 릴리즈를 Firebase에 배포

run-name: Firebase 배포 · ${{ inputs.release_tag || github.event.release.tag_name }}

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Firebase로 다시 배포할 릴리즈 태그
        required: true
        type: string

permissions:
  contents: read

jobs:
  distribute-firebase:
    name: Firebase App Distribution 배포
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Firebase 배포 대상 확인
        shell: bash
        run: |
          if [ -z "${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}" ] && [ -z "${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}" ]; then
            echo "FIREBASE_APP_DISTRIBUTION_GROUPS 또는 FIREBASE_APP_DISTRIBUTION_TESTERS secret 중 하나가 필요합니다."
            exit 1
          fi

      - name: JDK 17 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Firebase 서비스 계정 파일 생성
        shell: bash
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/firebase-service-account.json"
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: 릴리즈 노트 파일 생성
        shell: bash
        run: |
          notes_file="$RUNNER_TEMP/release-notes.txt"
          {
            echo "Release tag: $RELEASE_TAG"
            echo "Triggered by: ${{ github.event_name }}"
            echo "Repository: ${{ github.repository }}"
          } > "$notes_file"
          echo "FIREBASE_RELEASE_NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

      - name: 릴리즈 APK 다운로드
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN }}
        shell: bash
        run: |
          mkdir -p app/build/outputs/apk/release
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ["REPO"]
          token = os.environ["TOKEN"]
          release_tag = os.environ["RELEASE_TAG"]

          release_url = f"https://api.github.com/repos/{repo}/releases/tags/{release_tag}"
          req = urllib.request.Request(
              release_url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "mistbottle-release-distributor",
              },
          )
          with urllib.request.urlopen(req) as response:
              release = json.load(response)

          assets = release.get("assets", [])
          target = next((asset for asset in assets if asset.get("name") == "app-release.apk"), None)
          if not target:
              raise SystemExit(f"app-release.apk asset not found in release {release_tag}")

          download_req = urllib.request.Request(
              target["url"],
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/octet-stream",
                  "User-Agent": "mistbottle-release-distributor",
              },
          )
          output_path = os.path.join("app", "build", "outputs", "apk", "release", "app-release.apk")
          with urllib.request.urlopen(download_req) as response, open(output_path, "wb") as file:
              file.write(response.read())
          print(f"Downloaded release asset to {output_path}")
          PY

      - name: Firebase App Distribution 배포
        env:
          APP_VERSION_TAG: ${{ env.RELEASE_TAG }}
          FIREBASE_APP_DISTRIBUTION_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}
          FIREBASE_APP_DISTRIBUTION_TESTERS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}
        run: ./gradlew appDistributionUploadRelease
