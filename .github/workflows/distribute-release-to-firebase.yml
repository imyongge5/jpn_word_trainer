name: 릴리즈를 Firebase에 배포

run-name: Firebase 배포

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Firebase로 다시 배포할 릴리즈 태그
        required: true
        type: string

permissions:
  contents: read

jobs:
  distribute-firebase:
    name: Firebase App Distribution 배포
    runs-on: ubuntu-latest
    env:
      FIREBASE_APP_DISTRIBUTION_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}
      FIREBASE_APP_DISTRIBUTION_TESTERS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: JDK 17 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: CI 스크립트 의존성 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-ci.txt

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 릴리즈 태그 결정
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 릴리즈 APK 다운로드
        run: |
          python scripts/ci_download_release_apk.py \
            --release-tag "${{ steps.release_tag.outputs.release_tag }}" \
            --output-path "app/build/outputs/apk/release/app-release.apk"

      - name: Firebase App Distribution 배포
        run: |
          python scripts/ci_distribute_firebase.py \
            --version-tag "${{ steps.release_tag.outputs.release_tag }}" \
            --note-line "Release tag: ${{ steps.release_tag.outputs.release_tag }}" \
            --note-line "Triggered by: ${{ github.event_name }}" \
            --note-line "Repository: ${{ github.repository }}" \
            --artifact-path "app/build/outputs/apk/release/app-release.apk"
