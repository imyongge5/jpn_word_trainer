name: 빌드 태그 APK 빌드

run-name: 빌드 태그 실행 · ${{ github.ref_name }}

on:
  push:
    tags:
      - build

permissions:
  contents: write

jobs:
  build-and-release:
    name: 빌드와 릴리즈 생성
    runs-on: ubuntu-latest
    env:
      WORKFLOW_PUSH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: JDK 17 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: CI 스크립트 의존성 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-ci.txt

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 버전 계산
        id: version
        run: python scripts/ci_compute_version.py --output-name version_tag

      - name: 릴리즈 APK 빌드
        run: python scripts/ci_build_release.py --version-tag "${{ steps.version.outputs.version_tag }}"

      - name: 패치노트 생성
        id: notes
        run: |
          python scripts/ci_collect_patch_notes.py \
            --version-tag "${{ steps.version.outputs.version_tag }}" \
            --source-tag "${{ github.ref_name }}" \
            --commit-sha "${{ github.sha }}" \
            --output-path "build/ci/release-notes.txt"

      - name: 버전 태그 및 GitHub Release 발행
        run: |
          python scripts/ci_publish_release.py \
            --version-tag "${{ steps.version.outputs.version_tag }}" \
            --apk-path "app/build/outputs/apk/release/app-release.apk" \
            --release-notes-file "${{ steps.notes.outputs.patch_notes_file }}" \
            --additional-tag "${{ steps.notes.outputs.build_history_tag }}"
