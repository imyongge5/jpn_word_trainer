name: 빌드 태그 APK 빌드

run-name: 빌드 태그 실행 · ${{ github.ref_name }}

on:
  push:
    tags:
      - build

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: JDK 17 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 빌드 대상 버전 계산
        id: version_tag
        shell: bash
        run: |
          source version-series.properties
          base_commit=$(git log -n 1 --format=%H -- version-series.properties)
          commits_after_base=$(git rev-list --count "${base_commit}..HEAD")
          version_ccc=$((commits_after_base + 1))
          version_tag="v${VERSION_A}.${VERSION_B}.${version_ccc}"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"

      - name: 프리빌트 시드 DB 생성
        run: python scripts/generate_seed_db.py

      - name: 디버그 APK 빌드
        env:
          APP_VERSION_TAG: ${{ steps.version_tag.outputs.version_tag }}
        run: ./gradlew assembleDebug

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ steps.version_tag.outputs.version_tag }}
          path: app/build/outputs/apk/debug/app-debug.apk
